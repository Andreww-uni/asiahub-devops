services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: asiahub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"

volumes:
  postgres_data:
