---
- name: Setup AsiaHub server
  hosts: asiahub
  become: true

  vars:
    app_user: asiahub
    app_dir: /opt/asiahub/app
    repo_url: https://github.com/Andreww-uni/AsiaHub.git

  tasks:
    - name: Install curl and git
      apt:
        name:
          - curl
          - git
        state: present
        update_cache: true

    - name: Add NodeSource repository
      shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.sources

    - name: Install Node.js
      apt:
        name: nodejs
        state: present

    - name: Create asiahub system user
      user:
        name: "{{ app_user }}"
        system: true
        shell: /bin/bash
        home: /home/{{ app_user }}
        create_home: true

    - name: Create application directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0750'
      loop:
        - /opt/asiahub
        - /opt/asiahub/logs

    - name: Add safe directory for git
      command: git config --global --add safe.directory {{ app_dir }}
      args:
        creates: /opt/asiahub/app/.git

    - name: Clone AsiaHub repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        update: false

    - name: Set ownership of app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: true

    - name: Install npm dependencies
      command: npm install
      args:
        chdir: "{{ app_dir }}/server"
        creates: "{{ app_dir }}/server/node_modules"

    - name: Deploy systemd unit file
      template:
        src: templates/asiahub.service.j2
        dest: /etc/systemd/system/asiahub.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    - name: Enable and start asiahub service
      systemd:
        name: asiahub
        enabled: true
        state: started
        daemon_reload: true

    - name: Install docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu jammy stable
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Add vagrant user to docker group
      user:
        name: vagrant
        groups: docker
        append: true

    - name: Copy docker-compose.yml to server
      copy:
        src: ../docker-compose.yml
        dest: /opt/asiahub/docker-compose.yml
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Copy database.sql to server
      copy:
        src: ../database.sql
        dest: /opt/asiahub/database.sql
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Start PostgreSQL container
      community.docker.docker_compose_v2:
        project_src: /opt/asiahub
        state: present
      environment:
        DB_PASSWORD: "{{ db_password }}"

    - name: Create scripts directory
      file:
        path: /opt/asiahub/scripts
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Deploy monitor script
      copy:
        src: scripts/monitor.sh
        dest: /opt/asiahub/scripts/monitor.sh
        owner: root
        group: root
        mode: '0755'

    - name: Deploy monitor systemd service
      template:
        src: templates/asiahub-monitor.service.j2
        dest: /etc/systemd/system/asiahub-monitor.service
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    - name: Deploy monitor systemd timer
      template:
        src: templates/asiahub-monitor.timer.j2
        dest: /etc/systemd/system/asiahub-monitor.timer
        owner: root
        group: root
        mode: '0644'
      notify: Reload systemd

    - name: Enable and start monitor timer
      systemd:
        name: asiahub-monitor.timer
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Create .env file
      copy:
        dest: "{{ app_dir }}/server/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'
        content: |
          PORT=5000
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=asiahub
          DB_USER=postgres
          DB_PASSWORD={{ db_password }}
          JWT_SECRET={{ jwt_secret }}
          JWT_EXPIRES_IN=7d
